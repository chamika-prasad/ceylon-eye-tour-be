name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch full history for diffing

    - name: Check for file changes
      id: changes
      run: |
        # Check package.json
        git diff --name-only HEAD~1 HEAD | grep -q "package.json" && echo "package_changed=true" >> $GITHUB_OUTPUT || echo "package_changed=false" >> $GITHUB_OUTPUT

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e
          
          cd /root/ceylon-eye-tour-be
          
          echo "Stopping application..."
          pm2 stop 4 || { echo "Failed to stop application"; exit 1; }
          
          echo "Pulling latest code..."
          git pull origin main || { echo "Failed to pull latest code"; exit 1; }
          
          # Install dependencies only if package.json changed
          if [ "${{ steps.changes.outputs.package_changed }}" == "true" ]; then
            echo "package.json changed. Installing dependencies..."
            npm install || { echo "Failed to install dependencies"; exit 1; }
          else
            echo "No changes in package.json. Skipping npm install."
          fi
          
          # Always run database setup
          echo "Running database setup..."
          npm run setup-db || { echo "Failed to run database setup"; exit 1; }
          
          # Always run database seed
          echo "Running database seed..."
          npm run seed-db || { echo "Failed to run database seed"; exit 1; }
          
          echo "Starting application..."
          pm2 start 4 || { echo "Failed to start application"; exit 1; }
          pm2 save || { echo "Failed to save pm2 state"; exit 1; }
          
          echo "Deployment completed successfully!"